services:
  jacob-files:
    build: .
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      PORT: "9000"
      ROOT_DIR: "/data"
      PASSWORD: "choose-a-password"
      SESSION_SECRET: "choose-a-long-random-secret-with-at-least-24-characters"
      SESSION_COOKIE_SECURE: ""
    volumes:
      - ./data:/data
